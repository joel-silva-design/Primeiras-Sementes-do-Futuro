<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <h1>Exemplo de formulário e tipos de input's do HTML</h1>
    </header>
    <main>
        <h2>Formulário</h2>
        <form>
            <div>
                <label for="nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" pattern="[a-z]"
                required>

                <label for="telefone">Telefone (apenas números)</label>
                <input type="tel" name="telefone" id="telefone" pattern="[0-9]{10,11}"
                title="Digite apenas números, 10 ou 11 digitos"
                required>
            </div>

            <div>
                <label for="email">Seu Email</label>
                <input type="email" name="email" id="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                title="Digite um email válido"
                required>

                <label for="senha"> Senha (entre 8 e 20 caracteres):</label>
                <input type="password" name="senha" id="senha"
                minlength="8"
                maxlength="20"
                required>
            </div>

            <label for="bio"> Bio (máx. 500 caracteres)</label>
            <textarea name="bio" id="bio"
            maxlength="500"
            placeholder="Conte um pouco sobre você..."></textarea>

            <div>
                            <button type="submit">Enviar</button>
            </div>
            
        </form>
       
       <h2>Alguns tipos de <i>input</i></h2>
        <input type="date" id="nascimento" name="nascimento">
        <input type="time" id="horario" name="horario">
        <input type="datetime-local" id="agendamento" name="agendamento">

        <input type="month" id="mes" name="mes">
        <input type="week" name="semana" id="semana">

        <input type="number" name="idade" id="idade" min="0" max="120" step="1">
        <input type="range" name="progresso" id="progresso" min="0" max="100" value="10">
     
        <input type="file" name="arquivo" id="arquivo" accept=".pdf,.doc,.docx">
        <input type="file" name="imagem" id="imagem" accept="image/*" multiple>

        <input type="color" name="cor" id="cor" value="#3498db">

        <input type="search" name="busca" id="busca" placeholder="Busque no site...">

    </main>

</body>
</html>
